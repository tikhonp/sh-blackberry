services:
  music-download-bot:
    image: ghcr.io/tikhonp/music-download-bot:latest
    container_name: music-download-bot
    restart: unless-stopped
    env_file:
      - ./secrets/blackberry/music-download.env
    environment:
      APPLE_MUSIC_DOWNLOAD_URL: "http://apple-music-api:8080"
    volumes:
      - "${SWINGMUSIC_DATA}/music/qobuz:/downloads"
      - "${SWINGMUSIC_DATA}/music-downloader-bot:/data"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    labels:
      - dev.dozzle.group=music
    depends_on:
      - apple-music-api

  apple-music-wrapper:
    image: ghcr.io/tikhonp/wrapper:latest
    container_name: apple-music-wrapper
    restart: unless-stopped
    environment:
      args: "-H 0.0.0.0"
    volumes:
      - "${SWINGMUSIC_DATA}/apple-music-data/:/app/rootfs/data/"
    expose:
      - "10020"
      - "20020"
      - "30020"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    labels:
      - dev.dozzle.group=music

  apple-music-api:
    image: ghcr.io/tikhonp/apple-music-dl-http-wrapper:v1.1.5
    container_name: apple-music-api
    restart: unless-stopped
    environment:
      - PUID=10001
      - PGID=10001
    expose:
      - "8080"
    volumes:
      - "${SWINGMUSIC_DATA}/music/apple-music/:/downloads/"
      - ./secrets/blackberry/apple-music-config.yaml:/app/config.yaml
    depends_on:
      - apple-music-wrapper
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    labels:
      - dev.dozzle.group=music
  
  musicbrainz-picard:
    image: jlesage/musicbrainz-picard:latest
    container_name: musicbrainz-picard
    restart: unless-stopped
    environment:
      - USER_ID=10001
      - GROUP_ID=10001
      - TZ=Europe/Moscow
      - DARK_MODE=0
    expose:
      - "5800"
    volumes:
      - "${SWINGMUSIC_DATA}/picard:/config"
      - "${SWINGMUSIC_DATA}/music:/music"
      - "${SWINGMUSIC_DATA}/picard-data:/storage"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    labels:
      - dev.dozzle.group=music
    # Uncomment the following line to give Picard access to CD-ROM drive
    # devices:
    #   - "/dev/sr0:/dev/sr0"

  ssht-musicbrainz-picard:
    image: jnovack/autossh:${AUTOSSH_V}
    container_name: ssht-musicbrainz-picard
    restart: unless-stopped
    env_file: 
      - ./secrets/ssh-tunnel.env
      - .env
    environment:
      - SSH_OPTIONS=-o UserKnownHostsFile=/dev/null
      - SSH_TUNNEL_PORT=10008
      - SSH_TARGET_HOST=musicbrainz-picard
      - SSH_TARGET_PORT=5800
    volumes:
      - "./secrets/ssh-key:/id_rsa:ro"
    depends_on:
      - musicbrainz-picard
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    labels:
      - dev.dozzle.group=music

  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    env_file:
      - "./secrets/blackberry/navidrome.env"
      - "./secrets/proxy.env"
    volumes:
      - "${SWINGMUSIC_DATA}/music:/music:ro"
      - "${SWINGMUSIC_DATA}/navidrome:/data"
    expose:
      - 4533
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    labels:
      - dev.dozzle.group=music

  ssht-navidrome:
    image: jnovack/autossh:${AUTOSSH_V}
    container_name: ssht-navidrome
    restart: unless-stopped
    env_file: 
      - ./secrets/ssh-tunnel.env
      - .env
    environment:
      - SSH_OPTIONS=-o UserKnownHostsFile=/dev/null
      - SSH_TUNNEL_PORT=10011
      - SSH_TARGET_HOST=navidrome
      - SSH_TARGET_PORT=4533
    volumes:
      - "./secrets/ssh-key:/id_rsa:ro"
    depends_on:
      - navidrome
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    labels:
      - dev.dozzle.group=music

  audiomuse-redis:
    image: redis:7-alpine
    container_name: audiomuse-redis
    restart: unless-stopped
    volumes:
      - "${SWINGMUSIC_DATA}/audiomuse/redis:/data"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    labels:
      - dev.dozzle.group=audiomuse

  audiomuse-postgres:
    image: postgres:15-alpine
    container_name: audiomuse-postgres
    restart: unless-stopped
    env_file: "./secrets/blackberry/audiomuse.env"
    volumes:
      - "${SWINGMUSIC_DATA}/audiomuse/postgres:/var/lib/postgresql/data"
      - "${SWINGMUSIC_DATA}/audiomuse/backups:/tmp/dumps"
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-U", "audiomuse", "-d", "audiomusedb" ]
      interval: 1s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    labels:
      - dev.dozzle.group=audiomuse

  audiomuse-flask:
    image: ghcr.io/neptunehub/audiomuse-ai:latest
    container_name: audiomuse-ai-flask-app
    restart: unless-stopped
    env_file: "./secrets/blackberry/audiomuse.env"
    environment:
      SERVICE_TYPE: flask
      POSTGRES_HOST: audiomuse-postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: "redis://audiomuse-redis:6379/0"
      TEMP_DIR: /app/temp_audio
      MEDIASERVER_TYPE: navidrome
      NAVIDROME_URL: "http://navidrome:4533"
    expose:
      - "8000"
    depends_on:
      audiomuse-postgres:
        condition: service_healthy
      audiomuse-redis:
        condition: service_started
    volumes:
      - "${SWINGMUSIC_DATA}/audiomuse/temp-flask:/app/temp_audio"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    labels:
      - dev.dozzle.group=audiomuse

  audiomuse-worker:
    image: ghcr.io/neptunehub/audiomuse-ai:latest
    container_name: audiomuse-ai-worker
    restart: unless-stopped
    env_file: "./secrets/blackberry/audiomuse.env"
    environment:
      SERVICE_TYPE: worker
      POSTGRES_HOST: audiomuse-postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: "redis://audiomuse-redis:6379/0"
      TEMP_DIR: /app/temp_audio
      MEDIASERVER_TYPE: navidrome
      NAVIDROME_URL: "http://navidrome:4533"
    depends_on:
      audiomuse-postgres:
        condition: service_healthy
      audiomuse-redis:
        condition: service_started
    volumes:
      - "${SWINGMUSIC_DATA}/audiomuse/temp-worker:/app/temp_audio"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    labels:
      - dev.dozzle.group=audiomuse

  ssht-audiomuse:
    image: jnovack/autossh:${AUTOSSH_V}
    container_name: ssht-audiomuse
    restart: unless-stopped
    env_file: 
      - ./secrets/ssh-tunnel.env
      - .env
    environment:
      - SSH_OPTIONS=-o UserKnownHostsFile=/dev/null
      - SSH_TUNNEL_PORT=10004
      - SSH_TARGET_HOST=audiomuse-flask
      - SSH_TARGET_PORT=8000
    volumes:
      - "./secrets/ssh-key:/id_rsa:ro"
    depends_on:
      - audiomuse-flask
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    labels:
      - dev.dozzle.group=audiomuse
