services:
  nginx-mountaintea:
    image: ghcr.io/tikhonp/mountaintea-band-site-nginx:latest
    container_name: mountaintea-nginx-prod
    restart: unless-stopped
    volumes:
      - media-data:/media-volume
    depends_on:
      - mountaintea-server
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    labels:
      - dev.dozzle.group=mountaintea

  ssht-mountaintea:
    image: jnovack/autossh:${AUTOSSH_V}
    container_name: ssht-mountaintea
    restart: unless-stopped
    env_file: 
      - ./secrets/ssh-tunnel.env
      - .env
    environment:
      - SSH_OPTIONS=-o UserKnownHostsFile=/dev/null
      - SSH_TUNNEL_PORT=10000
      - SSH_TARGET_HOST=nginx-mountaintea
      - SSH_TARGET_PORT=80
    volumes:
      - "./secrets/ssh-key:/id_rsa:ro"
    depends_on:
      - copyparty
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    labels:
      - dev.dozzle.group=mountaintea

  mountaintea-server:
    image: ghcr.io/tikhonp/mountaintea-band-site-server:latest
    container_name: mountaintea-server
    env_file: "./secrets/blackberry/mountaintea.env"
    restart: unless-stopped
    depends_on:
      mountiantea-db:
        condition: service_healthy
    hostname: server
    volumes:
      - media-data:/app/mountaintea_band_site/media
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    labels:
      - dev.dozzle.group=mountaintea

  mountiantea-db:
    image: postgres:17.6
    container_name: mountaintea-db
    env_file: "./secrets/blackberry/mountaintea.env"
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql/data
      - db-backup-data:/tmp/dumps
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-U", "dummy", "-d", "mountaintea-db" ]
      interval: 1s
      timeout: 5s
      retries: 5
    hostname: db
    labels:
      - docker-volume-backup.archive-pre=/bin/sh -c 'pg_dump -U dummy -w mountaintea-db > /tmp/dumps/mountaintea-db.dump'
      - dev.dozzle.group=mountaintea
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  mountiantea-backup:
    image: offen/docker-volume-backup:v2
    container_name: mountaintea-backup
    env_file: "./secrets/blackberry/mountaintea.env"
    environment:
      BACKUP_FILENAME: backup-%Y-%m-%dT%H-%M-%S.tar.gz
      BACKUP_PRUNING_PREFIX: backup-
      BACKUP_RETENTION_DAYS: '7'
    restart: always
    volumes:
      - media-data:/backup/media-backup:ro
      - db-backup-data:/backup/db-backup:ro
      - ${HOME}/backups/mountaintea:/archive
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

volumes:
  db-data:
    name: "mountaintea-db-data"
    external: true
  media-data:
    name: "mountaintea-media-data"
    external: true
  db-backup-data:
    name: "mountaintea-db-backup-data"
